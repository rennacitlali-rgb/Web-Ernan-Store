<!DOCTYPE html>
<html lang="id">
<head>

  <title>My Links</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .profile {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .link {
      display: block;
      background: white;
      color: black;
      text-decoration: none;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.3s;
    }

    .link:hover {
      transform: scale(1.05);
      background: #ddd;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
