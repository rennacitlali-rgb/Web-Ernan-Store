<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ernan Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
      position: relative;
      background: #111;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
      background-size: 400%;
      animation: rgb 5s linear infinite;
      border-radius: 20px;
      z-index: -1;
    }

    @keyframes rgb {
      0% {background-position: 0%}
      100% {background-position: 400%}
    }

    .profile {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 15px;
      object-fit: cover;
    }

    h1 {
      font-size: 20px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .link {
      display: block;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      position: relative;
      overflow: hidden;
      z-index: 1;
      font-weight: 500;
    }

    .link::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
      background-size: 400%;
      animation: rgb 4s linear infinite;
      border-radius: 10px;
      z-index: -1;
    }

    .link::after {
      content: "";
      position: absolute;
      inset: 2px;
      background: black;
      border-radius: 8px;
      z-index: -1;
    }

    .link:hover {
      transform: scale(1.05);
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://via.placeholder.com/100" class="profile">

    <h1>Ernan Hilderan</h1>
    <p>@ernan_store</p>

    <a class="link" href="https://instagram.com/reno_ramadni" target="_blank">Instagram</a>
    <a class="link" href="https://wa.me/6285640750940" target="_blank">WhatsApp</a>
    <a class="link" href="https://www.facebook.com/share/1CHtH2ijL7/" target="_blank">Facebook</a>
    <a class="link" href="https://whatsapp.com/channel/0029VbCFpVE4o7qF262RdF3K" target="_blank">Testimoni</a>

    <div class="footer">© 2026 Ernan Store</div>
  </div>

</body>
</html>
